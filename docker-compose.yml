services:
  app:
    build: .
    ports:
      - "8000-8002:80"
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=pino-parkir
      - DB_USERNAME=root
      - DB_PASSWORD=123
      - SESSION_DRIVER=database
      - QUEUE_CONNECTION=file
      - CACHE_STORE=file
    depends_on:
      - db
  
  db:
    image: mysql:8.0
    environment:
      - MYSQL_DATABASE=pino-parkir
      - MYSQL_ROOT_PASSWORD=123
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata: